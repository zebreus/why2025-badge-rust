name: BadgeVMS std rustup dist

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/badgevms-std-toolchain.yml"
      - "tools/badgevms-std/**"
      - "why2025-badge-rust-toolchain"
      - "why2025-badge-sys-bindings/**"
      - "examples/std-hello-world/**"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: badgevms-std-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BADGEVMS_DIST_TOOLCHAIN: nightly-2099-01-01
  BADGEVMS_DIST_DATE: "2099-01-01"
  BADGEVMS_TARGET: riscv32imafc-unknown-badgevms
  BADGEVMS_PAGES_ROOT: https://zebreus.github.io/why2025-badge-rust

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-08-09
          components: rust-src
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git python3 cmake ninja-build build-essential binutils pkg-config libssl-dev file
      - name: Initialize bundled Rust toolchain
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git submodule update --init why2025-badge-rust-toolchain
          git -C why2025-badge-rust-toolchain submodule update --init \
            library/backtrace \
            src/llvm-project \
            src/tools/cargo
      - name: Build rustup dist tree
        env:
          BADGEVMS_DIST_BASE_URL: ${{ env.BADGEVMS_PAGES_ROOT }}/dist
        run: ./tools/badgevms-std/dist-toolchain.sh site "$BADGEVMS_DIST_BASE_URL"
      - name: Test generated dist tree locally
        run: |
          python3 -m http.server 8000 --directory site > /tmp/badgevms-dist-server.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/dist/channel-rust-nightly.toml.sha256 >/dev/null; then
              break
            fi
            sleep 1
          done
          ./tools/badgevms-std/checks/run-dist-smoke.sh http://127.0.0.1:8000 "$BADGEVMS_DIST_TOOLCHAIN"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Test deployed GitHub Pages dist in clean Ubuntu container
        run: |
          pages_root="${{ steps.deployment.outputs.page_url }}"
          pages_root="${pages_root%/}"
          docker run --rm \
            -e BADGEVMS_PAGES_ROOT="$pages_root" \
            -e BADGEVMS_DIST_TOOLCHAIN="$BADGEVMS_DIST_TOOLCHAIN" \
            -e BADGEVMS_TARGET="$BADGEVMS_TARGET" \
            ubuntu:24.04 bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive
              apt-get update >/dev/null
              apt-get install -y ca-certificates curl build-essential file >/dev/null
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal >/dev/null
              . "$HOME/.cargo/env"
              export RUSTUP_DIST_SERVER="$BADGEVMS_PAGES_ROOT"
              export RUSTUP_TERM_PROGRESS_WHEN=never
              rustup toolchain install "$BADGEVMS_DIST_TOOLCHAIN" --profile minimal
              rustup target add "$BADGEVMS_TARGET" --toolchain "$BADGEVMS_DIST_TOOLCHAIN"
              rustup component add rust-src --toolchain "$BADGEVMS_DIST_TOOLCHAIN"
              export RUSTC
              RUSTC=$(rustup which --toolchain "$BADGEVMS_DIST_TOOLCHAIN" rustc)
              rustup run "$BADGEVMS_DIST_TOOLCHAIN" cargo new --bin hello-badgevms >/dev/null
              cd hello-badgevms
              rustup run "$BADGEVMS_DIST_TOOLCHAIN" cargo build --target "$BADGEVMS_TARGET"
              file "target/$BADGEVMS_TARGET/debug/hello-badgevms"
            '
