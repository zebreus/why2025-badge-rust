name: BadgeVMS std rustup dist

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/badgevms-std-toolchain.yml"
      - "tools/badgevms-std/**"
      - "why2025-badge-rust-toolchain"
      - "why2025-badge-sys-bindings/**"
      - "examples/std-hello-world/**"
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

concurrency:
  group: badgevms-std-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  BADGEVMS_DIST_TOOLCHAIN: nightly-2099-01-01
  BADGEVMS_DIST_DATE: "2099-01-01"
  BADGEVMS_TARGET: riscv32imafc-unknown-badgevms
  BADGEVMS_PAGES_ROOT: https://zebreus.github.io/why2025-badge-rust

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-08-09
          components: rust-src
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y git python3 cmake ninja-build build-essential binutils pkg-config libssl-dev file
      - name: Initialize bundled Rust toolchain
        run: |
          git config --global url."https://github.com/".insteadOf git@github.com:
          git submodule update --init --depth 1 why2025-badge-rust-toolchain
          git -C why2025-badge-rust-toolchain submodule update --init --depth 1 --jobs 3 \
            library/backtrace \
            src/llvm-project \
            src/tools/cargo
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: badgevms-std-dist
          cache-on-failure: true
          workspaces: |
            why2025-badge-rust-toolchain -> build
      - name: Build rustup dist tree
        env:
          BADGEVMS_DIST_BASE_URL: ${{ env.BADGEVMS_PAGES_ROOT }}/dist
        run: ./tools/badgevms-std/dist-toolchain.sh site "$BADGEVMS_DIST_BASE_URL"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
