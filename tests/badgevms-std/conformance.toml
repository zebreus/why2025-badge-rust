target = "riscv32imafc-unknown-badgevms"
record_prefix = "BADGEVMS_STD_TEST"

[[suite]]
name = "target"
requires = ["compile"]
cases = ["cfg_identity", "panic_abort"]

[[suite]]
name = "link"
requires = ["compile", "elf-inspection"]
cases = ["shared_object", "main_entry", "closed_exports", "expected_imports"]

[[suite]]
name = "thread"
requires = ["hardware"]
cases = ["spawn_join", "detach", "tls_destructors", "panic_abort", "park_unpark", "park_timeout", "available_parallelism", "stack_size"]

[[suite]]
name = "sync"
requires = ["hardware"]
cases = ["mutex_contention", "condvar_notify_one", "condvar_notify_all", "condvar_timeout"]

[[suite]]
name = "time"
requires = ["hardware"]
cases = ["instant_monotonic", "system_time", "sleep_best_effort", "duration_overflow"]

[[suite]]
name = "fs"
requires = ["hardware", "storage"]
cases = ["vms_path_file", "directory_listing", "metadata", "remove", "cwd_unsupported", "symlink_unsupported", "uid_gid_unsupported", "mode_mutation_unsupported"]

[[suite]]
name = "stdio"
requires = ["hardware", "terminal-capture"]
cases = ["stdout", "stderr", "panic_output", "is_terminal"]

[[suite]]
name = "env"
requires = ["hardware"]
cases = ["args", "var_getenv", "vars_environ", "mutation_unsupported"]

[[suite]]
name = "process"
requires = ["hardware"]
cases = ["raw_path_spawn", "argv_default", "argv_explicit", "try_wait", "wait", "status", "pid_reuse_cache", "unsupported_builders", "synthetic_zero"]

[[suite]]
name = "net"
requires = ["hardware", "network"]
cases = ["tcp_stream", "tcp_listener", "to_socket_addrs", "udp_unsupported", "unix_socket_unsupported"]

[[suite]]
name = "fd"
requires = ["hardware"]
cases = ["owned_fd_file", "borrowed_fd_stdio", "owned_fd_tcp", "dup_unsupported", "fcntl_unsupported", "pipe_unsupported"]
